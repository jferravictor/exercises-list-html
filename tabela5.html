<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tabela 5 - Mapa de Setores de um Evento</title>
</head>
<body>
    <table width="600px">
        <tr>
            <td colspan="20" rowspan="2">ENTRADA PRINCIPAL</td>
        </tr>
        <tr></tr>

        <tr>
            <td colspan="4" rowspan="5">SETOR ESQUERDO</td>
            <td colspan="5" rowspan="3">SETOR CENTRAL 1</td>
            <td colspan="5" rowspan="6">SETOR CENTRAL 2</td>
            <td colspan="6" rowspan="2">SETOR DIREITO</td>
        </tr>

        <tr></tr>

        <tr>
            <td colspan="6" rowspan="5">CELULA DIREITO 1</td>
        </tr>

        <tr>
            <td colspan="5" rowspan="5">CELULA CENTRAL 1</td>
        </tr>
        
        <tr></tr>
        
        <tr>
            <td colspan="4" rowspan="4">CELULA ESQUERDA 1</td>
        </tr>

        <tr>
            <td colspan="5" rowspan="7">CELULA CENTRAL 2</td>
        </tr>

        <tr>
            <td colspan="6" rowspan="6">CELULA DIREITO 2</td>
        </tr>
        
        <tr>
            <td colspan="5" rowspan="5">CELULA CENTRAL 3</td>
        </tr>

        <tr>
            <td colspan="4" rowspan="4">CELULA ESQUERDA 2</td>
        </tr>

        <tr></tr><tr></tr><tr></tr>

    </table>
</body>
</html>
